name: Metrics

on:
  schedule:
    # 每天北京时间 00:00 (UTC 16:00) 自动刷新
    - cron: "0 16 * * *"
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # 主统计卡片：头部信息 + 近期动态 + 社区数据 + 仓库数据
      - name: Base metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-metrics.svg
          base: "header, activity, community, repositories"
          config_timezone: Asia/Shanghai

      # 语言使用占比
      - name: Languages metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-metrics-languages.svg
          base: ""
          config_timezone: Asia/Shanghai
          plugin_languages: yes
          plugin_languages_ignored: "html, css, dockerfile, makefile"
          plugin_languages_limit: 8
          plugin_languages_details: percentage

      # 全年等距视角贡献日历
      - name: Isocalendar metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-metrics-isocalendar.svg
          base: ""
          config_timezone: Asia/Shanghai
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
